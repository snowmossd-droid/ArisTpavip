warmup: 5

messages:
  request_sent_tpa:
    - "&7You sent #00A4FC{player} &7a teleport request. &cThis teleport request might be a trap."
  request_sent_tpa_ab: "&7You sent a teleport request"
  request_received_tpa:
    - "&cThis teleport request might be a tp trap"
  request_accepted_tpa_receiver_ab: "&7You accepted this tpa"

  request_sent_tpahere:
    - "&7You sent #00A4FC{player} &7a tpahere"
  request_sent_tpahere_ab: "&7You sent #00A4FC{player} &7a tpahere"
  request_received_tpahere:
    - "&cThis teleport request might be a tp trap"
  request_accepted_tpahere_receiver_ab: "&7You accepted this tpahere"

  tpauto_enabled:
    - "#55FF55Auto-accept teleport requests enabled."
  tpauto_enabled_ab: "#55FF55TpAuto &aON"
  tpauto_disabled:
    - "#FF5555Auto-accept teleport requests disabled."
  tpauto_disabled_ab: "#FF5555TpAuto &cOFF"

  tpatoggle_enabled:
    - "#55FF55You are now accepting tpa requests."
  tpatoggle_enabled_ab: "#55FF55TPA &aON"
  tpatoggle_disabled:
    - "#FF5555You are no longer accepting tpa requests."
  tpatoggle_disabled_ab: "#FF5555TPA &cOFF"

  tpaheretoggle_enabled:
    - "#55FF55You are now accepting tpahere requests."
  tpaheretoggle_enabled_ab: "#55FF55TPAHere &aON"
  tpaheretoggle_disabled:
    - "#FF5555You are no longer accepting tpahere requests."
  tpaheretoggle_disabled_ab: "#FF5555TPAHere &cOFF"

  target_tpa_disabled:
    - "#FF5555{player} is not accepting tpa requests."
  target_tpa_disabled_ab: "#FF5555{player} has tpa disabled"
  target_tpahere_disabled:
    - "#FF5555{player} is not accepting tpahere requests."
  target_tpahere_disabled_ab: "#FF5555{player} has tpahere disabled"

  teleporting_chat:
    - "#00A4FCTeleporting in &e{seconds} &7seconds... Don't move!"
  teleporting_ab: "#00A4FCTeleporting in &e{seconds}s&7... Don't move!"
  teleport_success:
    - "#55FF55Teleported successfully!"
  teleport_success_ab: "#55FF55Teleported!"
  teleport_cancelled_moved:
    - "#FF5555Teleport cancelled because you moved!"
  teleport_cancelled_moved_ab: "#FF5555Teleport cancelled! You moved."
  teleport_cancelled_damaged:
    - "#FF5555Teleport cancelled because you took damage!"
  teleport_cancelled_damaged_ab: "#FF5555Teleport cancelled! You took damage."

  target_offline:
    - "#FF5555The target player is no longer online."
  request_cancelled:
    - "#FF5555Teleport request cancelled."
  no_pending_requests:
    - "#FF5555You don't have any pending teleport requests."
  requester_offline:
    - "#FF5555The player who sent the request is no longer online."
  request_denied_sender:
    - "#FF5555Your teleport request was denied by {player}."
  request_denied_receiver:
    - "#FF5555Teleport request denied."
  incoming_request_cancelled:
    - "#FF5555The teleport request from {player} has been cancelled."
  outgoing_request_cancelled:
    - "#55FF55Your outgoing teleport request has been cancelled."

gui:
  title: "Confirm Request"
  size: 27
  items:
    cancel:
      material: RED_STAINED_GLASS_PANE
      name: "&cDeny"
      lore:
        - "&7Click to deny the teleport request"
    confirm_tpa:
      material: LIME_STAINED_GLASS_PANE
      name: "&aConfirm"
      lore:
        - "#55FF55Click to send {player} a tpa request"
    confirm_tpahere:
      material: LIME_STAINED_GLASS_PANE
      name: "&aConfirm"
      lore:
        - "#55FF55Click to teleport {player} to you"
    location:
      material: GRASS_BLOCK
      name: "#00F986Location"
      lore:
        - "&7{world}"
    region:
      material: FEATHER
      name: "#00F986Region"
      lore:
        - "&7Europe (#00A4FB{playerPing}&7)"
    playerhead:
      name: "#00F986Player"
      lore:
        - "&7{playerName}"
  tpaccept:
    confirm_tpa:
      material: LIME_STAINED_GLASS_PANE
      name: "&aConfirm"
      lore:
        - "#55FF55Click to teleport {player} to you"
    confirm_tpahere:
      material: LIME_STAINED_GLASS_PANE
      name: "&aConfirm"
      lore:
        - "#55FF55Click to teleport to {player}"

clickable_messages:
  accept_tpa:
    text:
      - "#37BFF8{player} &7sent you a tpa request."
      - "#00A3FB[CLICK TO ACCEPT] &7or type #00A3FB/tpaccept {player}"
  accept_tpahere:
    text:
      - "#37BFF8{player} &7sent you a tpahere request."
      - "#00A3FB[CLICK TO ACCEPT] &7or type #00A3FB/tpaccept {player}"
